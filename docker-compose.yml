services:
  api:
    container_name: api
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/var/www
    depends_on:
      - postgres
      - redis

  vue:
    container_name: vue
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules

  postgres:
    container_name: postgres
    image: postgres:latest
    environment:
      POSTGRES_DB: estoque
      POSTGRES_USER: ninja
      POSTGRES_PASSWORD: ninja
    ports:
      - "5432:5432"

  redis:
    container_name: redis
    image: redis:7
    ports:
      - "6379:6379"

networks: 
  default: 
    name: estoque-network